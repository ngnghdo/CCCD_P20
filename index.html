const A2_TIME=3,A2_MEM=65536,A2_PAR=4,A2_LEN=32;
function normName(s){return s.trim().replace(/\s+/g,' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u0111/g,'d');}
async function a2Hash(cccd,saltHex){const s=new Uint8Array(saltHex.match(/.{2}/g).map(b=>parseInt(b,16)));const r=await argon2.hash({pass:cccd,salt:s,time:A2_TIME,mem:A2_MEM,parallelism:A2_PAR,hashLen:A2_LEN,type:argon2.ArgonType.Argon2id});return r.hashHex;}
async function check(){
  const nameIn=document.getElementById('inp-name').value,cccdIn=document.getElementById('inp-cccd').value.trim();
  if(!nameIn.trim()||!cccdIn){show(false,'','','Vui lòng nhập đầy đủ họ tên và số CCCD.');return;}
  if(!/^\d{12}$/.test(cccdIn)){show(false,'','','Số CCCD phải gồm đúng 12 chữ số.');return;}
  const btn=document.getElementById('btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Đang kiểm tra…';
  try{
    const key=normName(nameIn),cands=DB.filter(s=>normName(s.n)===key);
    let matched=null;
    for(const s of cands){const h=await a2Hash(cccdIn,s.s);if(h===s.h){matched=s;break;}}
    if(matched)show(true,matched.n,matched.l,'Thông tin của em đã được nhập.');
    else show(false,'','',cands.length>0?'Họ tên khớp nhưng số CCCD chưa đúng.':'Không tìm thấy thông tin. Em nhắn lại cho anh Đô nhé.');
  }finally{btn.disabled=false;btn.innerHTML='Kiểm tra';}
}
function show(ok,name,lop,msg){
  const res=document.getElementById('result');res.className='result '+(ok?'success':'error');
  document.getElementById('res-icon').textContent=ok?'✅':'❌';
  document.getElementById('res-name').textContent=ok?name:'';
  document.getElementById('res-class').innerHTML=ok?'<span class="result-class class-'+lop.toLowerCase()+'">'+lop+'</span>':'';
  document.getElementById('res-msg').textContent=msg;
}
document.getElementById('inp-cccd').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-cccd').focus();});
